# Example local CodePDE backend config.
# Point this at a local model server such as Ollama or a llama.cpp HTTP wrapper.

llm_backend:
  type: ollama
  model: llama3.1:8b-instruct
  temperature: 0.2
  top_p: 0.9
  max_tokens: 4096

system_prompt_file: .copilot/codepde-agent.prompt.md

code_generation:
  language: cpp
  include_comments: true
  style: structured

project_context_file: .copilot/context.md