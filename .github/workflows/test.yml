name: Test Suite

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # allow manual trigger

jobs:
  # ── Mocked unit tests (fast, no QGIS needed) ──────────────────────────
  mock-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy gmsh>=4.12
        # pdoc for optional doc build verification
        pip install pdoc>=14.0

    - name: Mock GUI tests (no QGIS)
      run: |
        PYTHONPATH="$PWD:$PWD/build:$PWD/tests" \
          python3 -m unittest -v \
          tests.test_workbench_gui \
          tests.test_swe2d_results_queries \
          tests.test_swe2d_velocity_layer \
          tests.test_bridge_stacked_mesh \
          tests.test_bridge_stacked_runtime

    - name: Python security audit (Bandit)
      run: |
        pip install bandit>=1.7
        python3 -m bandit -r swe2d/ --quiet || echo "Bandit findings (non-fatal, review recommended)"

    - name: Python style audit
      run: |
        python3 tools/python_style_audit.py || echo "Style audit warnings (non-fatal)"

    - name: Verify pdoc builds without errors
      run: |
        cd docs && pdoc ../swe2d --skip-errors --docformat numpy --output-dir /tmp/pdoc-check

    - name: C++ host-code static analysis (Cppcheck)
      run: |
        sudo apt-get install -y cppcheck
        cppcheck --enable=warning,performance,information \
          --suppress=cstyleCast \
          --suppress=unmatchedSuppression \
          --error-exitcode=0 \
          --quiet \
          cpp/src/ || echo "Cppcheck warnings (non-fatal)"

  # ── Build + unit tests (requires hydra_swe2d native module) ───────────
  build-and-cpu-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ python3-dev

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Python deps
      run: |
        pip install numpy gmsh>=4.12

    - name: Install CUDA toolkit
      uses: Jimver/cuda-toolkit@v0.2.35
      with:
        cuda: '12.4.0'
        method: network

    - name: Build native module (CUDA, tests skip gracefully without GPU)
      run: |
        mkdir -p build && cd build
        cmake .. -DBACKWATER_USE_CUDA=ON -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Run mesh and import tests (no GPU required)
      run: |
        PYTHONPATH="$PWD:$PWD/build:$PWD/tests" \
          python3 -m unittest -v \
          tests.test_swe2d_mesh

  # ── Optional: headless QGIS smoke test (QGIS must be available) ──────
  qgis-smoke-test:
    runs-on: ubuntu-latest
    if: false  # disabled by default — enable when QGIS CI runner is set up
    steps:
    - uses: actions/checkout@v4

    - name: Install QGIS + Xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y qgis python3-qgis xvfb

    - name: Run headless QGIS smoke test
      run: |
        bash tests/run_headless_qgis_tests.sh --qgis
