name: Build & Release Plugin Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write          # needed to create GitHub Releases

env:
  BUILD_TYPE: Release

jobs:
  # ── Linux x86_64 + CUDA ───────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for version stamping

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.0'
          method: network
          sub-packages: '["nvcc", "cudart"]'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3-dev python3-numpy

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBACKWATER_USE_CUDA=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Collect binaries
        run: |
          mkdir -p dist/lib
          find build -maxdepth 2 -name '*.so' -exec cp {} dist/lib/ \;

      - name: Package
        run: |
          # Include full plugin tree except build artifacts and dev files
          rsync -av --progress \
            --exclude='build/' \
            --exclude='dist/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.opencode/' \
            --exclude='.copilot/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='tests/' \
            --exclude='tools/' \
            --exclude='docs/' \
            --exclude='reference/' \
            --exclude='typings/' \
            --exclude='cpp/' \
            --exclude='report_output/' \
            --exclude='AGENTS.md' \
            --exclude='GPU_AUDIT_REPORT.md' \
            --exclude='MOMENTUM_CAP_FIX.md' \
            --exclude='docs/PUBLIC_BRANCH_PLAN.md' \
            --exclude='2d_example/' \
            --exclude='example_project/' \
            --exclude='cuda_keyring*' \
            --exclude='cuda_download*/' \
            ./ dist/hydra2dgpu/

          # Place prebuilt libs into the plugin tree
          cp dist/lib/*.so dist/hydra2dgpu/

          # Create the release ZIP
          cd dist
          zip -r ../hydra2gpu-linux-x86_64.zip hydra2dgpu/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydra2gpu-linux-x86_64
          path: hydra2gpu-linux-x86_64.zip

  # ── Windows x86_64 + CUDA ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.0'
          method: network

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install numpy
        run: pip install numpy

      - name: Find Python paths
        id: py
        shell: pwsh
        run: |
          $pydir = python -c "import sys; print(sys.prefix)"
          $inc   = python -c "import sysconfig; print(sysconfig.get_path('include'))"
          "pydir=$pydir"   >> $env:GITHUB_OUTPUT
          "inc=$inc"       >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBACKWATER_USE_CUDA=ON `
            -DCUDAToolkit_ROOT=$env:CUDA_PATH `
            -DPython3_ROOT_DIR=${{ steps.py.outputs.pydir }} `
            -DPython3_INCLUDE_DIR=${{ steps.py.outputs.inc }}

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Collect binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/lib
          Get-ChildItem -Path build -Recurse -Filter "*.pyd" |
            Copy-Item -Destination dist/lib/
          # Bundle CUDA runtime DLL so the .pyd can load without a system-wide CUDA install
          Copy-Item "$env:CUDA_PATH\bin\cudart64_*.dll" dist\lib\

      - name: Package
        shell: pwsh
        run: |
          # Create staging directory
          New-Item -ItemType Directory -Force -Path dist\hydra2dgpu | Out-Null

          # Copy top-level items, skipping large dev/build directories
          Get-ChildItem -Path . -Exclude @('build','dist','.git','.github','.opencode','.copilot',
            '__pycache__','tests','tools','docs','reference','typings','cpp','report_output',
            '2d_example','example_project','cuda_download','cuda_download_*') |
            ForEach-Object {
              if ($_.PSIsContainer) {
                Copy-Item $_.FullName dist\hydra2dgpu\ -Recurse -Force -ErrorAction SilentlyContinue
              } else {
                Copy-Item $_.FullName dist\hydra2dgpu\ -Force -ErrorAction SilentlyContinue
              }
            }

          # Remove unwanted file patterns from the staged tree
          Get-ChildItem dist\hydra2dgpu -Recurse -Include @('*.pyc','*.pyo','cuda_keyring*',
            'cuda_installer*','AGENTS.md','GPU_AUDIT_REPORT.md','MOMENTUM_CAP_FIX.md',
            '*PUBLIC_BRANCH_PLAN*') -Force | Remove-Item -Force -ErrorAction SilentlyContinue

          # Place prebuilt libs and CUDA runtime DLL into the plugin root
          Copy-Item dist\lib\*.pyd dist\hydra2dgpu\ -Force
          Copy-Item dist\lib\cudart64_*.dll dist\hydra2dgpu\ -Force

          # Create the release ZIP
          Compress-Archive -Path dist\hydra2dgpu -DestinationPath hydra2gpu-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydra2gpu-windows-x86_64
          path: hydra2gpu-windows-x86_64.zip

  # ── Create GitHub Release ──────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: hydra2gpu-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
