name: Build & Release Plugin Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write          # needed to create GitHub Releases

env:
  BUILD_TYPE: Release

jobs:
  # ── Linux x86_64 + CUDA ───────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for version stamping

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.0'
          method: network
          sub-packages: '["nvcc", "cudart"]'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3-dev python3-numpy

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBACKWATER_USE_CUDA=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Collect binaries
        run: |
          mkdir -p dist/lib
          find build -maxdepth 2 -name '*.so' -exec cp {} dist/lib/ \;

      - name: Package
        run: |
          # Include full plugin tree except build artifacts and dev files
          rsync -av --progress \
            --exclude='build/' \
            --exclude='.git/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='tests/' \
            --exclude='tools/' \
            --exclude='docs/' \
            --exclude='reference/' \
            --exclude='typings/' \
            --exclude='cpp/' \
            --exclude='report_output/' \
            --exclude='AGENTS.md' \
            --exclude='GPU_AUDIT_REPORT.md' \
            --exclude='MOMENTUM_CAP_FIX.md' \
            --exclude='docs/PUBLIC_BRANCH_PLAN.md' \
            ./ dist/plugin/

          # Place prebuilt libs into the plugin tree
          cp dist/lib/*.so dist/plugin/

          # Create the release ZIP
          cd dist
          zip -r ../hydra2gpu-linux-x86_64.zip plugin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydra2gpu-linux-x86_64
          path: hydra2gpu-linux-x86_64.zip

  # ── Windows x86_64 + CUDA ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.0'
          method: network

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install numpy
        run: pip install numpy

      - name: Find Python paths
        id: py
        shell: pwsh
        run: |
          $pydir = python -c "import sys; print(sys.prefix)"
          $inc   = python -c "import sysconfig; print(sysconfig.get_path('include'))"
          "pydir=$pydir"   >> $env:GITHUB_OUTPUT
          "inc=$inc"       >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBACKWATER_USE_CUDA=ON `
            -DCUDAToolkit_ROOT=$env:CUDA_PATH `
            -DPython3_ROOT_DIR=${{ steps.py.outputs.pydir }} `
            -DPython3_INCLUDE_DIR=${{ steps.py.outputs.inc }}

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Collect binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/lib
          Get-ChildItem -Path build -Recurse -Filter "*.pyd" |
            Copy-Item -Destination dist/lib/

      - name: Package
        shell: pwsh
        run: |
          # Copy plugin tree (exclude dev/build dirs)
          $excludes = @(
            'build', '.git', '__pycache__', 'tests', 'tools',
            'docs', 'reference', 'typings', 'cpp',
            'report_output', 'AGENTS.md', 'GPU_AUDIT_REPORT.md',
            'MOMENTUM_CAP_FIX.md', 'docs\PUBLIC_BRANCH_PLAN.md'
          )
          robocopy . dist\plugin /E /XD $excludes /XF *.pyc | Out-Null

          # Place prebuilt libs into the plugin tree
          Copy-Item dist\lib\*.pyd dist\plugin\

          # Create the release ZIP
          Compress-Archive -Path dist\plugin -DestinationPath hydra2gpu-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydra2gpu-windows-x86_64
          path: hydra2gpu-windows-x86_64.zip

  # ── Create GitHub Release ──────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: hydra2gpu-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
