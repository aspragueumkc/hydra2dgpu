# CodeQL Analysis — security vulnerability scanning for Python.
#
# Python is analyzed with build-mode: none (pure AST-based, no compilation).
# C/C++ CodeQL is NOT included here because the hydra_swe2d CMake target
# bundles .cpp and .cu files together with no CUDA-less build path.  CodeQL
# runners lack nvcc, so C++ analysis would require CMakeLists.txt changes
# to separate C++ sources into a CUDA-free target.
#
# For dependency vulnerability alerts, Dependabot is auto-enabled on public
# repos at https://github.com/aspragueumkc/hydra2dgpu/security/dependabot.
name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 10 * * 1'  # every Monday at 10:00 UTC

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
